name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: cargo build + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
      - name: cargo build --release
        run: cargo build --release --locked
      - name: cargo test
        run: cargo test --release --locked
      - name: Smoke-test verify subcommand
        run: ./target/release/mcp-memory-service-rs verify --db /tmp/ci-smoke.db

  parity:
    name: python parity suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Rust port
        uses: actions/checkout@v4
        with:
          path: mcp-memory-service-rs
      - name: Checkout upstream Python
        uses: actions/checkout@v4
        with:
          repository: doobidoo/mcp-memory-service
          path: mcp-memory-service
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mcp-memory-service-rs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install upstream Python deps
        working-directory: mcp-memory-service
        run: |
          pip install --upgrade pip
          pip install -e ".[sqlite]"
          pip install onnxruntime tokenizers
      - name: cargo build
        working-directory: mcp-memory-service-rs
        run: cargo build --locked
      - name: Embedding parity
        working-directory: mcp-memory-service-rs
        env:
          MMS_UPSTREAM_PATH: ${{ github.workspace }}/mcp-memory-service
        run: python scripts/parity_check.py
      - name: Storage parity
        working-directory: mcp-memory-service-rs
        env:
          MMS_UPSTREAM_PATH: ${{ github.workspace }}/mcp-memory-service
        run: python scripts/m4_parity.py
